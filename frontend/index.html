<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    header p {
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .upload-zone {
      border: 3px dashed #ddd;
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2rem;
    }

    .upload-zone:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .upload-zone.dragover {
      border-color: #667eea;
      background: #f0f2ff;
    }

    .upload-zone input {
      display: none;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .upload-text {
      color: #666;
      font-size: 1.1rem;
    }

    .upload-text span {
      color: #667eea;
      font-weight: 600;
    }

    .preview-container {
      display: none;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .preview-container.show {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .preview-box {
      text-align: center;
    }

    .preview-box h3 {
      margin-bottom: 1rem;
      color: #333;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
    }

    .actions {
      text-align: center;
      display: none;
    }

    .actions.show {
      display: block;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      margin-left: 1rem;
    }

    .btn-secondary:hover {
      background: #f8f9ff;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 3rem;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      display: none;
      background: #fee;
      border: 1px solid #fcc;
      color: #c00;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }

    .error.show {
      display: block;
    }

    footer {
      text-align: center;
      color: white;
      opacity: 0.8;
      margin-top: 2rem;
    }

    footer a {
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ Image Background Remover</h1>
      <p>Remove image backgrounds with one click</p>
    </header>

    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📤</div>
        <div class="upload-text">
          Drag & drop your image here, or <span>browse</span>
        </div>
        <div class="upload-text" style="margin-top: 0.5rem; font-size: 0.9rem; color: #999;">
          Supports JPG, PNG, WEBP (max 50MB)
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Removing background...</p>
      </div>

      <div class="preview-container" id="previewContainer">
        <div class="preview-box">
          <h3>Original</h3>
          <img id="originalPreview" alt="Original">
        </div>
        <div class="preview-box">
          <h3>Result</h3>
          <img id="resultPreview" alt="Result">
        </div>
      </div>

      <div class="error" id="error"></div>

      <div class="actions" id="actions">
        <button class="btn btn-primary" id="downloadBtn">⬇️ Download Result</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 Process Another</button>
      </div>
    </div>

    <footer>
      <p>Powered by <a href="https://www.remove.bg" target="_blank">Remove.bg</a> + <a href="https://workers.cloudflare.com" target="_blank">Cloudflare Workers</a></p>
    </footer>
  </div>

  <script>
    // Configuration - Replace with your Worker URL
    const API_URL = 'https://image-background-remover.your-account.workers.dev';

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const previewContainer = document.getElementById('previewContainer');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const actions = document.getElementById('actions');
    const error = document.getElementById('error');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    let resultBlob = null;

    // Drag and drop handlers
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, preventDefaults);
      document.body.addEventListener(eventName, preventDefaults);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      uploadZone.addEventListener(eventName, () => uploadZone.classList.add('dragover'));
    });

    ['dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, () => uploadZone.classList.remove('dragover'));
    });

    uploadZone.addEventListener('drop', handleDrop);
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFileSelect);

    function handleDrop(e) {
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    function handleFileSelect(e) {
      const files = e.target.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    async function processFile(file) {
      // Validate file
      if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
        showError('Please upload a JPG, PNG, or WEBP image.');
        return;
      }

      if (file.size > 50 * 1024 * 1024) {
        showError('File too large. Maximum size is 50MB.');
        return;
      }

      // Show original preview
      originalPreview.src = URL.createObjectURL(file);
      hideError();

      // Show loading
      uploadZone.style.display = 'none';
      loading.classList.add('show');

      try {
        // Send to API
        const formData = new FormData();
        formData.append('image', file);

        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({ error: 'Unknown error' }));
          throw new Error(errorData.error || 'Failed to process image');
        }

        resultBlob = await response.blob();
        resultPreview.src = URL.createObjectURL(resultBlob);

        // Show results
        loading.classList.remove('show');
        previewContainer.classList.add('show');
        actions.classList.add('show');

      } catch (err) {
        loading.classList.remove('show');
        uploadZone.style.display = 'block';
        showError(err.message || 'Failed to process image. Please try again.');
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;

      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'removed-background.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    resetBtn.addEventListener('click', () => {
      resultBlob = null;
      resultPreview.src = '';
      originalPreview.src = '';
      previewContainer.classList.remove('show');
      actions.classList.remove('show');
      uploadZone.style.display = 'block';
      fileInput.value = '';
    });

    function showError(message) {
      error.textContent = message;
      error.classList.add('show');
    }

    function hideError() {
      error.classList.remove('show');
    }
  </script>
</body>
</html>
